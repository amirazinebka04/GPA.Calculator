<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">GPA Calculator</h2>
            <form action="calculate.php" method="POST">
                <div id="course-list">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <input type="text" name="course[]" class="form-control" placeholder="Course Name" required>
                        </div>
                        <div class="col-md-3">
                            <input type="number" name="credits[]" class="form-control" placeholder="Credits" min="1" required>
                        </div>
                        <div class="col-md-3">
                            <select name="grade[]" class="form-select">
                                <option value="4.0">A (4.0)</option>
                                <option value="3.0">B (3.0)</option>
                                <option value="2.0">C (2.0)</option>
                                <option value="1.0">D (1.0)</option>
                                <option value="0.0">F (0.0)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Calculate GPA</button>
            </form>
        </div>
    </div>
</body>
</html>
